name: Build & Deploy

on:
  push:
    branches: ["main", "staging"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          if [ "${{ github.ref_name }}" = "main" ]; then
            TAG="latest"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "IMAGE_NAME=ghcr.io/$OWNER/pingpong-pro:$TAG" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}
          platforms: linux/amd64

      - name: Trigger Dokploy deployment (production)
        if: github.ref_name == 'main'
        run: curl --fail -X POST "${{ secrets.DOKPLOY_PROD_WEBHOOK_URL }}"

      - name: Trigger Dokploy deployment (staging)
        if: github.ref_name == 'staging'
        run: curl --fail -X POST "${{ secrets.DOKPLOY_STAGING_WEBHOOK_URL }}"
